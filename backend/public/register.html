<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Converse — Create Account</title>
  <link rel="stylesheet" href="login.css" />
</head>
<body>

  <div class="night-sky" aria-hidden="true">
    <div class="stars stars--far"></div>
    <div class="stars stars--near"></div>
    <div class="mountains mountains--back"></div>
    <div class="mountains mountains--front"></div>
  </div>

  <main class="auth-stage">
    <section class="auth-card">
      <header class="auth-card__header">
        <span class="auth-card__icon">
          <img src="C-2-removebg-preview.png" alt="Converse Logo" height="auto" width="50">
        </span>
        <h1 id="auth-title">Get started</h1>
        <p id="auth-subtitle">Create an account to start chatting</p>
      </header>

      <p id="auth-message" class="auth-message" role="alert" hidden></p>

      <form id="register-form" class="auth-form" novalidate>
        <label class="field">
          <span>Choose a username</span>
          <input type="text" id="register-username" autocomplete="username" required />
        </label>

        <label class="field">
          <span>Create a password</span>
          <input type="password" id="register-password" autocomplete="new-password" required />
        </label>

        <div class="password-requirements">
          <label class="req-item">
            <input type="checkbox" id="req-length" disabled />
            <span>12–16 characters long</span>
          </label>
          <label class="req-item">
            <input type="checkbox" id="req-case" disabled />
            <span>Uppercase & lowercase mix</span>
          </label>
          <label class="req-item">
            <input type="checkbox" id="req-number" disabled />
            <span>At least one number</span>
          </label>
          <label class="req-item">
            <input type="checkbox" id="req-symbol" disabled />
            <span>At least one symbol</span>
          </label>
        </div>

        <label class="field">
          <span>Confirm password</span>
          <input type="password" id="register-confirm" autocomplete="new-password" required />
        </label>

        <button type="submit" class="auth-submit" disabled style="opacity: 0.5; cursor: not-allowed;">Create account</button>
      </form>

      <p class="auth-toggle">
        <span>
          Already have an account?
          <a href="login.html" class="link-btn" id="show-login">Log in</a>
        </span>
      </p>
    </section>
  </main>

  <script defer type="module" src="register.js"></script>
</body>
</html>
