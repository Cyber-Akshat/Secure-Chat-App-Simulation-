<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔒 Secure Chat App Simulation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="chat-container">
        <div class="chat-header">
            <h2>Secure Chat</h2>
            <div class="status-container">
                <span class="status-dot"></span>
                <span id="status-text">Connecting...</span>
            </div>
        </div>

        <div id="message-box">
            <div class="message system-msg">
                Welcome to the Secure Chat App Simulation. Messages are fully encrypted end-to-end.
            </div>
        </div>

        <form id="chat-form">
            <input type="text" id="user-input" placeholder="Type a secure message..." autocomplete="off" required>
            <button type="submit" id="send-button">Send</button>
        </form>
    </div>

    <script src="app.js"></script>
</body>
</html>
